[build]
  base = "apps/web"
  command = "npx vite build"
  publish = "dist"

# Netlify serves .webmanifest as application/octet-stream by default, which
# some browsers refuse to parse as a PWA manifest.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
